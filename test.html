<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Ticket System — Case Study</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      font-family: 'DM Sans', 'Figtree', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .case-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ===== FOOTER - exactly matching the image ===== */
    .framer-10dw70x {
      background-color: #103263;
      width: 100%;
      padding: 40px 60px 60px 0;
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 463px;
      margin-top: auto;
    }
    .framer-7yi4qj {
      color: #fff;
      font-size: 32px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      width: 338px;
      flex-shrink: 0;
      text-align: left;
    }
    .framer-v0orri {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 33px;
      width: 316px;
      flex-shrink: 0;
    }

    /* ===== LINK STYLES - exactly like the image ===== */
    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 10px;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 26px;
      background: transparent;
      border: none;
      position: relative;
      white-space: nowrap;
    }

    /* Text label - always visible */
    .link-btn .label {
      transition: text-decoration 0.2s ease;
      display: inline;
    }

    /* Arrow container - hidden by default, appears on hover like the image */
    .link-btn .arrow-svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      transform: translateX(-6px);
    }
    .link-btn .arrow-svg svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    .link-btn .arrow-svg path {
      fill: none;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== HOVER STATE - exactly like the image: "LinkedIn →" with underline ===== */
    .link-btn:hover .label {
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 2px;
    }
    .link-btn:hover .arrow-svg {
      opacity: 1;
      transform: translateX(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1280px) {
      .framer-10dw70x {
        padding: 30px 20px 40px 20px;
        flex-wrap: wrap;
        gap: 30px;
        justify-content: center;
      }
      .framer-7yi4qj {
        width: 100%;
        text-align: center;
      }
      .framer-v0orri {
        width: 100%;
        justify-content: center;
        gap: 40px;
      }
    }

    @media (max-width: 768px) {
      .framer-v0orri {
        gap: 20px;
        flex-wrap: wrap;
      }
      .link-btn {
        font-size: 16px;
        padding: 6px 8px;
      }
      .link-btn .arrow-svg {
        width: 18px;
        height: 18px;
      }
      .framer-7yi4qj {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="case-wrapper">
    <!-- ===== MAIN CONTENT ===== -->
    <div style="padding: 40px 60px; max-width: 1280px; margin: 0 auto;">
      <h1 style="font-family:'Figtree',sans-serif; font-weight:600; font-size:2.5rem;">Event Ticket System</h1>
      <p style="font-family:'DM Sans',sans-serif; font-size:1.2rem; max-width:700px; margin-top:12px; color:#1a1a1a;">
        UX/UI Case Study · hover the footer links to see the arrow appear.
      </p>
      <div style="margin-top:30px; background:#f5f7fa; padding:20px; border-radius:12px;">
        <p style="font-family:'DM Sans',sans-serif;">⬇️ Scroll to the bottom footer. Hover to see <strong>LinkedIn →</strong> and <strong>Behance →</strong> exactly like the image.</p>
      </div>
    </div>

    <!-- ===== FOOTER - exactly like the image ===== -->
    <footer class="framer-10dw70x">
      <div class="framer-7yi4qj">CONTACT</div>

      <div class="framer-v0orri">
        <!-- LinkedIn - shows "LinkedIn →" on hover -->
        <a href="https://www.linkedin.com/in/chan-mya-mya-khin" target="_blank" class="link-btn">
          <span class="label">LinkedIn</span>
          <span class="arrow-svg">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.5 4L20 10.5L13.5 17M20 10.5H2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>

        <!-- Behance - shows "Behance →" on hover -->
        <a href="https://www.behance.net/chanmyamyakhin" target="_blank" class="link-btn">
          <span class="label">Behance</span>
          <span class="arrow-svg">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.5 4L20 10.5L13.5 17M20 10.5H2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </div>
    </footer>
  </div>

  <!-- floating hint -->
  <div style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:white; padding:8px 18px; border-radius:40px; font-family:'DM Sans',sans-serif; font-size:14px; pointer-events:none; opacity:0.8; backdrop-filter:blur(4px);">
    Hover → LinkedIn → &amp; Behance →
  </div>
</body>
</html>
